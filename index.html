<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подработка для студентов</title>
    <style>
        /* Общие стили */
:root {
    --primary-color: #9b05c5; /* Основной фиолеовый */
    --secondary-color: #67189c; /* Фиолетовый для кнопки зп*/
    --dark-bg: #2f4458;
    --light-bg: #a673be;
    --text-color: #333;
}
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: var(--light-bg);
    color: var(--text-color);
}

/* Шапка */
header {
    background: linear-gradient(135deg, var(--primary-color), #2980b9);
    color: white;
    padding: 60px 20px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 15px;
    padding: 10px 20px;
    background: var(--card-bg);
}

header-logo{
 width: 80px;
 height: auto;
}

header h1 {
    margin: 0;
    font-size: 2.5rem;
}

header p {
    font-size: 1.2rem;
    opacity: 0.9;
}
/* Навигация по сайту */

nav {
    background: rgb(212, 181, 26);
    padding: 15px;
    text-align: center;
    position: sticky;
    top: 1;
    box-shadow: 0 2px 10px rgba(40, 36, 36, 0.1);
    z-index: 1000;
}

nav a {
    text-decoration: none;
    color: var(--dark-bg);
    margin: 0 40px;
    font-weight: bold;
    transition: 0.3s;
}

nav a:hover {
    color: var(--primary-color);
}

.details {
    font-size: 0.95rem;
    color: #080108;
    margin-bottom: 30px;
}

.btn:hover {
    background: var(--dark-bg);
}

/* Футер */
footer {
    background: var(--dark-bg);
    color: rgb(253, 253, 253);
    text-align: center;
    padding: 15px;
    margin-top: 50px;
}

/* Для мобильных устройств */
@media (max-width: 600px) {
    header h1 { font-size: 1.8rem; }
    .container { margin: 20px auto; }
}


    </style>
</head>
<body>
<header class="header">
    <img src="logo.jpg" alt="Главное" class="header-logo">
    <h1>Работа для студентов</h1>
</header>
 <nav>
    <a href="all.html">Все вакансии</a>
    <a href="remote.html">Удалённо</a>
    <a href="contacts.html">Контакты</a>
    <a href="practice.html">Практика</a>
 </nav>
<h2>Сайт предоставляет уникальную информацию по выбору работ для студенто с гибким графиком или фиксированным, без опыта работ или с опытом,</h2>
</body>
